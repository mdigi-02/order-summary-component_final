<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">

    <title>Frontend Mentor | Order summary card</title>
  </head>

  <body>
    <img class="img-pattern-background" src="images/pattern-background-desktop.svg">
    <img class="img-pattern-background-mobile" src="images/pattern-background-mobile.svg">

    <div class="container-box-main">
      <div class="box-main">
        <div class="img-hero-wrapper">
          <img class="img-hero" src="images/illustration-hero.svg">
        </div>

        <div class="container-summary">
          <div class="title-wrapper">
            <p class="title">
              Order Summary
            </p>
          </div>

          <div class="description-wrapper">
            <p class="description">
              You can now listen to millions of songs, audiobooks, and podcasts on any
              device anywhere you like!
            </p>
          </div>
        </div>

        <div class="box-plan-info">
          <div class="icon-music-wrapper">
            <img class="icon-music" src="images/icon-music.svg">
          </div>

          <div class="plan-desc-wrapper">
            <p class="plan-type">
              Annual Plan
            </p>

            <p class="plan-cost">
              $59.99/year
            </p>
          </div>

          <div class="link-plan-change-wrapper">
            <a class="link-plan-change" href="https://example.com">
              Change
            </a>
          </div>
        </div>

        <div class="container-buttons">
          <button class="button-proceed">
            Proceed to Payment
          </button>

          <button class="button-cancel">
            Cancel Order
          </button>
        </div>
      </div>
    </div>
  </body>

</html>
